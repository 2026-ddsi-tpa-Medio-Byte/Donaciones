spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/donaciones}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── Métricas Datadog ──────────────────────────────────────────────────────────
management.datadog.metrics.export.api-key=${DATADOG_API_KEY:local-no-key}
management.datadog.metrics.export.application-key=${DATADOG_APP_KEY:local-app-key}
management.datadog.metrics.export.descriptions=false
management.datadog.metrics.export.uri=https://api.us5.datadoghq.com
management.datadog.metrics.export.enabled=true
management.datadog.metrics.export.step=10s
management.metrics.tags.app=donaciones
management.metrics.tags.env=${DATADOG_APP_KEY:local}

# Actuator Configuration
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# DevTools Configuration
spring.devtools.restart.enabled=true

# Server Configuration for Dockerfile
server.port=${PORT:8080}

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

APP.URL_DONADORES=${URL_DONADORES:http://localhost:8081}
APP.URL_LOGISTICA=${URL_LOGISTICA:http://localhost:8082}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
